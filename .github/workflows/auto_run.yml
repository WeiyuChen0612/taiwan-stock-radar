name: Daily Stock Update

on:
  schedule:
    # 設定每天台灣時間下午 16:30 自動執行 (國際標準時 08:30)
    - cron: '30 8 * * 1-5'
  workflow_dispatch: # 允許你隨時手動點擊執行

jobs:
  run-crawler:
    runs-on: ubuntu-latest
    steps:
    - name: 檢查程式碼
      uses: actions/checkout@v3

    - name: 安裝 Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 安裝爬蟲需要的套件
      run: pip install requests pandas

    - name: 執行 Python 爬蟲計算
      run: python crawler.py

    - name: 把算好的資料更新並推回網站
      run: |
        git config --global user.name "StockBot"
        git config --global user.email "bot@github.com"
        git add data.json
        git commit -m "自動更新今日法人籌碼" || exit 0
        git push
